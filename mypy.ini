[mypy]
# Suppress [import-untyped] errors for third-party libs without bundled stubs
# (e.g. PyYAML). The --ignore-missing-imports flag only handles [import] errors
# (module not found at all), not [import-untyped] (module found but no stubs).
# This is needed because mypy may run via uvx in an isolated environment that
# doesn't have types-PyYAML installed.
# WHY (TRDD-EKKIOYAO): the option name is the SINGULAR `disable_error_code` —
# mypy rejects the plural `disable_error_codes` with "Unrecognized option" and
# then ignores the whole config, so the suppression silently never applied.
disable_error_code = import-untyped
